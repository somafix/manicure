name: Telegram Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # проверка каждые 5 минут (бесплатно)
  workflow_dispatch:  # возможность запустить вручную

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install aiogram
      - run: python bot.py
